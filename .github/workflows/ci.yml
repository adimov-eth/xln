name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
    
    - name: Install dependencies
      run: bun install
    
    - name: Type check
      run: bun run typecheck
    
    - name: Run tests
      run: bun test
    
    - name: Check coverage
      run: bun test:coverage
      continue-on-error: true # While we build up coverage
    
  benchmark:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
    
    - name: Install dependencies
      run: bun install
    
    - name: Run benchmarks
      run: |
        echo "📊 Performance Benchmarks"
        echo "========================"
        # Add benchmark scripts as they're created
      continue-on-error: true