version: '3.8'

services:
  # J-Layer: Ethereum node for jurisdictional collateral
  ethereum:
    image: ethereum/client-go:stable
    container_name: xln-ethereum
    ports:
      - "8545:8545"
      - "8546:8546"
      - "30303:30303"
    volumes:
      - ethereum-data:/root/.ethereum
      - ./contracts:/contracts
    command: |
      --dev
      --dev.period=3
      --http
      --http.addr=0.0.0.0
      --http.port=8545
      --http.api=eth,net,web3,personal,admin,debug,txpool
      --http.corsdomain=*
      --ws
      --ws.addr=0.0.0.0
      --ws.port=8546
      --ws.api=eth,net,web3,personal,admin,debug,txpool
      --ws.origins=*
      --allow-insecure-unlock
      --rpc.gascap=0
      --rpc.txfeecap=0
      --mine
    networks:
      - xln-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 10

  # E-Layer: XLN Entity Consensus Server
  xln-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xln-server
    depends_on:
      ethereum:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"     # HTTP API
      - "3001:3001"     # WebSocket
      - "9090:9090"     # Metrics
    environment:
      NODE_ENV: production
      ETH_RPC_URL: http://ethereum:8545
      ETH_WS_URL: ws://ethereum:8546
      REDIS_URL: redis://redis:6379
      DB_PATH: /data/leveldb
      NETWORK_ID: mainnet
      CHAIN_ID: 1
      MIN_EOA_SIGNATURES: 2
      MAX_DELEGATION_DEPTH: 3
      FEE_THRESHOLD: 0.7
      MAX_FEE_MULTIPLIER: 10
    volumes:
      - xln-data:/data
      - ./src:/app/src:ro
      - ./old_src:/app/old_src:ro
      - ./contracts:/app/contracts:ro
    networks:
      - xln-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # A-Layer: P2P Channel Network
  xln-p2p:
    build:
      context: .
      dockerfile: Dockerfile.p2p
    container_name: xln-p2p
    depends_on:
      - xln-server
    ports:
      - "8080:8080"     # WebSocket P2P
      - "8081:8081"     # HTTP API
    environment:
      NODE_ENV: production
      SERVER_URL: http://xln-server:3000
      WS_PORT: 8080
      HTTP_PORT: 8081
      PEER_ID: ${PEER_ID:-alice}
      DB_PATH: /data/channels
    volumes:
      - p2p-data:/data
      - ./examples/demos:/app/demos:ro
    networks:
      - xln-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: xln-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - xln-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: xln-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - xln-network

  # Monitoring: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: xln-grafana
    depends_on:
      - prometheus
    ports:
      - "3002:3000"
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    networks:
      - xln-network

  # Trade Credit Demo UI
  trade-credit-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xln-trade-credit-ui
    depends_on:
      - xln-server
    ports:
      - "3003:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3000
      REACT_APP_WS_URL: ws://localhost:3001
    networks:
      - xln-network

volumes:
  ethereum-data:
  xln-data:
  p2p-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  xln-network:
    driver: bridge